            <span class="metric-label">Monthly Contributions</span>
            <span class="metric-value positive">${fmtFull(snap.totalMonthlyContributions)}</span>
          </div>`;
      }
      if (snap.totalTaxes > 0) {
        metricsHTML += `
          <div class="result-metric">
            <span class="metric-label">Total Taxes Paid</span>
            <span class="metric-value negative">${fmtFull(snap.totalTaxes)}</span>
          </div>`;
      }
      if (snap.totalSocialSecurity > 0) {
        metricsHTML += `
          <div class="result-metric">
            <span class="metric-label">Social Security Total</span>
            <span class="metric-value positive">${fmtFull(snap.totalSocialSecurity)}</span>
          </div>`;
      }
      if (snap.totalOneTimeIncome > 0) {
        metricsHTML += `
          <div class="result-metric">
            <span class="metric-label">One-Time Income</span>
            <span class="metric-value positive">${fmtFull(snap.totalOneTimeIncome)}</span>
          </div>`;
      }
      if (snap.totalOneTimeExpenses > 0) {
        metricsHTML += `
          <div class="result-metric">
            <span class="metric-label">One-Time Expenses</span>
            <span class="metric-value negative">${fmtFull(snap.totalOneTimeExpenses)}</span>
          </div>`;
      }
      if (snap.totalInflationLoss > 0) {
        metricsHTML += `
          <div class="result-metric">
            <span class="metric-label">Inflation Impact</span>
            <span class="metric-value negative">-${fmtFull(snap.totalInflationLoss)}</span>
          </div>`;
      }

      // Chart + milestone table
      const chartHTML = renderChart({
        yearlyData: snap.yearlyData,
        failedAtAge: snap.failedAtAge
      });

      let tableHTML = '';
      if (snap.yearlyData && snap.yearlyData.length > 1) {
        tableHTML = `
          <table class="results-table">
            <thead>
              <tr>
                <th>Age</th>
                <th>Balance</th>
              </tr>
            </thead>
            <tbody>
        `;
        snap.yearlyData.forEach((row, idx) => {
          if (idx % 5 === 0 || idx === snap.yearlyData.length - 1 || row.age === snap.failedAtAge) {
            const cls = row.balance < 0 ? 'negative' : 'positive';
            tableHTML += `
              <tr>
                <td>${row.age}</td>
                <td class="${cls}">${fmtFull(row.balance)}</td>
              </tr>
            `;
          }
        });
        tableHTML += '</tbody></table>';
      }

      // Compact layout: only the top status card is visible by default;
      // detail rows + metrics are hidden behind a twirl-down.
      // Chart & yearly table are NOT rendered here anymore -- they live in
      // the Data Viz node.
      body.innerHTML =
        statusHTML +
        `<details class="summary-details">
           <summary class="summary-details-toggle">Show details</summary>
           <div class="summary-details-body">
             ${summaryRowsHTML}
             ${metricsHTML}
           </div>
         </details>` +
        `<div class="summary-recalc-hint">⚡ Live — updates as you edit</div>`;

      // Connections need a redraw because the node may have grown taller
      requestAnimationFrame(() => updateConnections());
    }

    // ============ Bottom Timeline Panel ============
    let _timelineVisible = true;
    function toggleTimeline() {
      _timelineVisible = !_timelineVisible;
      const panel = document.getElementById('timelinePanel');
      if (panel) panel.classList.toggle('hidden', !_timelineVisible);
      try { localStorage.setItem('retirement-calc-timeline-visible', _timelineVisible ? '1' : '0'); } catch (e) {}
    }

    function updateTimeline(nodeSnapshots, sim, startAge) {
      const chartEl = document.getElementById('timelineChart');
      const badgeEl = document.getElementById('timelineBadge');
      if (!chartEl) return;

      const yearly = sim && sim.yearlyData ? sim.yearlyData : [];
      if (!yearly.length || yearly.length < 2) {
        chartEl.innerHTML = `<div class="timeline-empty">Add a Monthly Finances node (or Social Security) so a projection can be drawn.</div>`;
        if (badgeEl) badgeEl.textContent = '';
        return;
      }

      const fmt = (n) => {
        const sign = n < 0 ? '-' : '';
        const a = Math.abs(n);
        if (a >= 1e9) return sign + '$' + (a/1e9).toFixed(2) + 'B';
        if (a >= 1e6) return sign + '$' + (a/1e6).toFixed(2) + 'M';
        if (a >= 1e3) return sign + '$' + (a/1e3).toFixed(0) + 'K';
        return sign + '$' + Math.round(a);
      };

      chartEl.innerHTML = renderChart({ yearlyData: yearly, failedAtAge: sim.failedAtAge }, { wide: true });
      if (badgeEl) {
        const last = yearly[yearly.length - 1];
        badgeEl.textContent = `Age ${last.age} → ${fmt(last.balance)}`;
      }
    }

    function getConnectedNodes(startNodeId) {
      const result = [];
      const visited = new Set();
      visited.add(startNodeId);

      const queue = [startNodeId];
      while (queue.length > 0) {
        const current = queue.shift();
        connections.forEach(conn => {
          let nextId = null;
          if (conn.from === current) nextId = conn.to;
          // Allow input-side traversal too (so users can connect in any direction)
          else if (conn.to === current) nextId = conn.from;
          if (nextId && !visited.has(nextId)) {
            visited.add(nextId);
            const node = nodes.find(n => n.id === nextId);
            if (node) {
              result.push(node);
              queue.push(nextId);
            }
          }
        });
      }
      return result;
    }

    // ============ CHART (shared by summary nodes) ============
    function renderChart(data, opts = {}) {
      // opts.wide === true renders a header-less, expanded chart (used by
      // the bottom timeline panel). Larger viewBox width so labels breathe.
      const wide = !!opts.wide;
      const w = wide ? 1200 : 380;
      const h = wide ? 180 : 200;
      const pad = { l: 50, r: 10, t: 10, b: 25 };
      const innerW = w - pad.l - pad.r;
      const innerH = h - pad.t - pad.b;

      const balances = data.yearlyData.map(d => d.balance);
      const ages = data.yearlyData.map(d => d.age);

      const minBal = Math.min(0, ...balances);
      const maxBal = Math.max(0, ...balances);
      const range = maxBal - minBal || 1;

      const minAge = ages[0];
      const maxAge = ages[ages.length - 1];
      const ageRange = maxAge - minAge || 1;

      const xScale = (age) => pad.l + ((age - minAge) / ageRange) * innerW;
      const yScale = (bal) => pad.t + innerH - ((bal - minBal) / range) * innerH;

      // Build path
      let linePath = '';
      let areaPath = '';
      data.yearlyData.forEach((d, i) => {
        const x = xScale(d.age);
        const y = yScale(d.balance);
        if (i === 0) {
          linePath += `M ${x} ${y}`;
          areaPath += `M ${x} ${yScale(0)} L ${x} ${y}`;
        } else {
          linePath += ` L ${x} ${y}`;
          areaPath += ` L ${x} ${y}`;
        }
      });
      const lastX = xScale(data.yearlyData[data.yearlyData.length - 1].age);
      areaPath += ` L ${lastX} ${yScale(0)} Z`;

      // Grid lines (4 horizontal)
      let gridLines = '';
      let yLabels = '';
      for (let i = 0; i <= 4; i++) {
        const y = pad.t + (innerH / 4) * i;
        const val = maxBal - (range / 4) * i;
        gridLines += `<line class="chart-grid-line" x1="${pad.l}" y1="${y}" x2="${w - pad.r}" y2="${y}"/>`;
        const fmt = Math.abs(val) >= 1e6 ? '$' + (val / 1e6).toFixed(1) + 'M' :
                    Math.abs(val) >= 1e3 ? '$' + Math.round(val / 1e3) + 'K' :
                    '$' + Math.round(val);
        yLabels += `<text class="chart-axis-label" x="${pad.l - 4}" y="${y + 3}" text-anchor="end">${fmt}</text>`;
      }

      // X labels (start, middle, end, failure)
      let xLabels = '';
      const xTicks = [minAge, Math.round((minAge + maxAge) / 2), maxAge];
      xTicks.forEach(age => {
        const x = xScale(age);
        xLabels += `<text class="chart-axis-label" x="${x}" y="${h - 8}" text-anchor="middle">${age}</text>`;
      });

      // Zero line
      let zeroLine = '';
      if (minBal < 0) {
        const zy = yScale(0);
        zeroLine = `<line class="chart-zero-line" x1="${pad.l}" y1="${zy}" x2="${w - pad.r}" y2="${zy}"/>`;
      }

      // Failure marker
      let failMarker = '';
      if (data.failedAtAge !== null) {
        const fx = xScale(data.failedAtAge);
        failMarker = `
          <line class="chart-failure-marker" x1="${fx}" y1="${pad.t}" x2="${fx}" y2="${pad.t + innerH}"/>
          <text class="chart-axis-label" x="${fx}" y="${pad.t - 2}" text-anchor="middle" fill="var(--accent-expense)" font-weight="700">FAIL</text>
        `;
      }

      // Denser X ticks in wide mode (up to 8 ticks, whole-age spaced).
      if (wide) {
        xLabels = '';
        const tickCount = Math.min(8, Math.max(2, Math.round(ageRange / 5) + 1));
        for (let i = 0; i < tickCount; i++) {
          const age = Math.round(minAge + (ageRange * i) / (tickCount - 1));
          const x = xScale(age);
          xLabels += `<text class="chart-axis-label" x="${x}" y="${h - 8}" text-anchor="middle">${age}</text>`;
        }
      }

      if (wide) {
        return `
          <svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">`
          + gridLines
          + yLabels
          + xLabels
          + `<path class="chart-area" d="${areaPath}"/>`
          + zeroLine
          + `<path class="chart-line" d="${linePath}"/>`
          + failMarker
          + `</svg>`;
      }

      return `
        <div class="chart-container">
          <div class="chart-title">📈 Net Worth Over Time</div>
          <svg id="chartSvg" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
            ${gridLines}
            ${yLabels}
            ${xLabels}
            <path class="chart-area" d="${areaPath}"/>
            ${zeroLine}
            ${failMarker}
            <path class="chart-line chart-line-anim" d="${linePath}"/>
          </svg>
        </div>
      `;
    }

    function clearAll() {
      if (confirm('Clear all nodes? This cannot be undone.')) {
        nodes = [];
        connections = [];
        document.querySelectorAll('.node').forEach(n => n.remove());
        panOffset = { x: 0, y: 0 };
        zoom = 1;
        applyTransform();
        updateConnections();
        addNode('starting', 100, 100);
        localStorage.removeItem(STORAGE_KEY);
        saveState();
      }
    }

    // ============ CONFETTI ============
    function confetti() {
      const colors = ['#238636', '#3fb950', '#58a6ff', '#a371f7', '#f78166', '#f9c513'];
      const count = 60;
      for (let i = 0; i < count; i++) {
        const el = document.createElement('div');
        el.className = 'confetti';
        el.style.background = colors[Math.floor(Math.random() * colors.length)];
        el.style.left = (Math.random() * 100) + 'vw';
        el.style.top = '-20px';
        el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        el.style.transform = `rotate(${Math.random() * 360}deg)`;
        document.body.appendChild(el);

        const dx = (Math.random() - 0.5) * 300;
        const dy = window.innerHeight + 50;
        const rot = Math.random() * 720;
        const duration = 2000 + Math.random() * 1500;

        el.animate([
          { transform: `translate(0, 0) rotate(0deg)`, opacity: 1 },
          { transform: `translate(${dx}px, ${dy}px) rotate(${rot}deg)`, opacity: 0 }
        ], { duration, easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)' }).onfinish = () => el.remove();
      }
    }

    // ============ KEYBOARD ============
    document.addEventListener('keydown', (e) => {
      // Ignore shortcuts when typing into an input/textarea.
      const inField = document.activeElement && (
        document.activeElement.tagName === 'INPUT' ||
        document.activeElement.tagName === 'TEXTAREA'
      );

      // Delete selected node(s)
      if ((e.key === 'Delete' || e.key === 'Backspace') && selectedNodes.size && !inField) {
        deleteSelectedNodes();
        e.preventDefault();
        return;
      }

      // Cmd/Ctrl+Enter -> manual Calculate (still supported)
      if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) {
        calculate();
        e.preventDefault();
        return;
      }

      // Clipboard shortcuts (skip while typing so browser's own copy still works)
      if ((e.metaKey || e.ctrlKey) && !e.shiftKey && !inField) {
        const k = e.key.toLowerCase();
        if (k === 'c') { copySelectedNodes();  e.preventDefault(); return; }
        if (k === 'x') { cutSelectedNodes();   e.preventDefault(); return; }
        if (k === 'v') { pasteNodes();         e.preventDefault(); return; }
        if (k === 'd') { duplicateSelectedNodes(); e.preventDefault(); return; }
        if (k === 'a') {
          setSelection(nodes.map(n => n.id));
          e.preventDefault();
          return;
        }
      }

      if (e.key === 'Escape') {
        selectNode(null);
      }
    });

    // ============ START ============
    init();
  </script>
</body>
</html>
